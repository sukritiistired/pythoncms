{% extends "base.html" %}

{% block content %}

<h3>
{% if role %}
Edit Role
{% else %}
Add Role
{% endif %}
</h3>

<form method="post">

{% csrf_token %}

<div class="mb-3">

<label>Role Name</label>

<input type="text"
       name="name"
       class="form-control"
       value="{{ role.name|default:'' }}"
       required>

</div>


<div class="mb-3">

<label>Permissions</label>

<div class="border p-3" style="max-height:400px; overflow:auto">

{% for perm in permissions %}

<div class="form-check">

<input class="form-check-input"
       type="checkbox"
       name="permissions"
       value="{{ perm.id }}"

{% if role and perm in role.permissions.all %}
checked
{% endif %}

>

<label class="form-check-label">

{{ perm.name }}

</label>

</div>

{% endfor %}

</div>

</div>

<button class="btn btn-success">
Save
</button>

<a href="{% url 'core:role_list' %}" class="btn btn-secondary">
Cancel
</a>

</form>

{% endblock %}
